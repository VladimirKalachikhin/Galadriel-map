<svg viewBox="0 0 50 150"  preserveAspectRatio="xMaxYMax meet" xmlns="http://www.w3.org/2000/svg">
	<desc>License: CC BY-NC-SA 4.0 Vladimir Yurievich Kalachikhin</desc>
	<!-- Вертикальный прямоугольник -->
	<rect x="20" y="40" width="10" height="95" fill="yellow" stroke="black" stroke-width="2" />
	<!-- Косой крест чёрный -->
	<line x1="15" y1="10" x2="35" y2="30" stroke="black" stroke-width="5" stroke-linecap="square"/>
	<line x1="35" y1="10" x2="15" y2="30" stroke="black" stroke-width="5" stroke-linecap="square"/>
	<!-- Косой крест жёлтый -->
	<line x1="15" y1="10" x2="35" y2="30" stroke="yellow" stroke-width="2" stroke-linecap="square"/>
	<line x1="35" y1="10" x2="15" y2="30" stroke="yellow" stroke-width="2" stroke-linecap="square"/>
	<!-- Короткий штрих, направленный вниз, в середине нижней части прямоугольника -->
	<line x1="25" y1="135" x2="25" y2="150" stroke="black" stroke-width="2"/>
</svg>
